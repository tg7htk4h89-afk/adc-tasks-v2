<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tasks - ADC Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/shared.css">
  <link rel="stylesheet" href="./assets/css/tasks.css">
</head>
<body>

<div id="overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>
<nav class="sidebar" id="sidebar">
  <div style="padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0">
    <div class="sb-logo">KIB</div>
    <div><div class="sb-name">ADC Task Manager</div><div class="sb-sub">Kuwait International Bank</div></div>
  </div>
  <div style="padding:8px;flex:1">
    <div class="sb-section">Main</div><a href="./tasks.html" class="nav-a on"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Tasks</span></a><a href="./tasks-archive.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span>Archive</span></a><a href="./todo.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>My To-Do</span></a><a href="./training.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Training</span></a><a href="./settings.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></a>
  </div>
  <div style="padding:10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r1)">
      <div class="sb-av" id="sbAv"><span id="sbAvTxt">?</span></div>
      <div style="flex:1;min-width:0"><div class="sb-uname" id="sbUname">—</div><div class="sb-urole" id="sbUrole">—</div></div>
      <button onclick="AUTH.out()" style="background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;padding:4px;border-radius:4px" title="Sign out">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <header class="top-bar">
    <button class="sb-btn" id="sbBtn" aria-label="Menu"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="tb-title">Tasks<small>ADC Task Manager</small></div>
  </header>
  <div class="page-content">
    <div class="hero">
      <div class="hero-body">
        <div class="hero-tag">Task Management</div>
        <div class="hero-h">Task Board</div>
        <div class="hero-stats">
          <div><div class="hval" id="hTotal">&#8212;</div><div class="hlbl">Total</div></div>
          <div><div class="hval" id="hOpen">&#8212;</div><div class="hlbl">Open</div></div>
          <div><div class="hval" id="hOver" style="color:#FCA5A5">&#8212;</div><div class="hlbl">Overdue</div></div>
          <div><div class="hval" id="hDone" style="color:#6EE7B7">&#8212;</div><div class="hlbl">Done</div></div>
        </div>
      </div>
      <div class="hero-ring" style="position:relative"><svg width="76" height="76" viewBox="0 0 76 76"><circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/><circle id="hRing" cx="38" cy="38" r="32" fill="none" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="201" transform="rotate(-90 38 38)" style="transition:stroke-dashoffset .6s ease"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff" id="hPct">0%</div></div>
    </div>
    <div class="bar">
      <div class="pills">
        <button class="pill on" onclick="setFilter('all',this)">All</button>
        <button class="pill" onclick="setFilter('mine',this)">Mine</button>
        <button class="pill" onclick="setFilter('overdue',this)">Overdue</button>
      </div>
      <button class="btn-add" id="btnNew" style="display:none" onclick="location.href='./task-form.html'">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Task
      </button>
    </div>
    <div class="kb-wrap"><div id="board"><div class="loading"><div class="spin" style="margin-bottom:10px"></div><div>Loading...</div></div></div></div>
  </div>
</main>

<nav class="mbn" id="mbn"><a href="./tasks.html" class="mbn-a on"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Tasks</span></a><a href="./tasks-archive.html" class="mbn-a"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span>Archive</span></a><a href="./todo.html" class="mbn-a"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>To-Do</span></a><button class="mbn-a" onclick="document.getElementById('moreSheet').classList.add('open');document.getElementById('moreBg').classList.add('open')">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      <span>More</span>
    </button></nav><div class="more-bg" id="moreBg" onclick="this.classList.remove('open');document.getElementById('moreSheet').classList.remove('open')"></div>
<div class="more-sheet" id="moreSheet">
  <div class="more-handle"></div>
  <div class="more-grid">
    <a href="./training.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a>
    <a href="./settings.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    <div class="more-item" onclick="AUTH.out()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
    </div>
  </div>
</div>

<!-- Task detail modal -->
<div id="tModal" onclick="if(event.target===this)closeTask()" style="position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px">
  <div id="tSheet" style="background:var(--card);border-radius:16px;width:100%;max-width:860px;height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(10,22,40,.25);overflow:hidden">
    <div id="tHead" style="flex-shrink:0;overflow:hidden"></div>
    <div id="tBody" style="overflow-y:auto;flex:1;min-height:0;padding-bottom:20px;-webkit-overflow-scrolling:touch"></div>
  </div>
</div>
<!-- New task modal -->
<div id="nModal" onclick="if(event.target===this)closeNew()" style="position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px">
  <div class="modal-box nb">
    <div class="modal-h"><span class="modal-t">New Task</span><button class="modal-x" onclick="closeNew()">&#215;</button></div>
    <div class="tabs" id="nTabs">
      <button class="tab on" onclick="switchNTab('det',this)">Details</button>
      <button class="tab" onclick="switchNTab('asg',this)">Assignees (<span id="selCnt">0</span>)</button>
    </div>
    <div id="np-det" class="panel on">
      <div class="fgrp"><label class="flbl">Title *</label><input type="text" id="ntTitle" placeholder="Task title..."></div>
      <div class="frow">
        <div class="fgrp"><label class="flbl">Category</label><select id="ntCat"><option>General</option><option>Performance</option><option>HR</option><option>Operations</option><option>Technical</option><option>Training</option><option>Quality</option><option>Scheduling</option></select></div>
        <div class="fgrp"><label class="flbl">Priority</label><select id="ntPri"><option>Medium</option><option>Low</option><option>High</option><option>Critical</option></select></div>
      </div>
      <div class="frow">
        <div class="fgrp"><label class="flbl">Due Date</label><input type="datetime-local" id="ntDue"></div>
        <div class="fgrp"><label class="flbl">SLA (hrs)</label><input type="number" id="ntSla" value="24" min="1"></div>
      </div>
      <div class="fgrp"><label class="flbl">Description</label><textarea id="ntDesc" placeholder="Description..." rows="3"></textarea></div>
    </div>
    <div id="np-asg" class="panel">
      <input type="text" id="asgQ" placeholder="Search by name or role..." style="margin-bottom:10px" oninput="renderAsgList(this.value)">
      <div id="asgList" style="max-height:250px;overflow-y:auto;margin-bottom:10px"></div>
      <div style="background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r2);padding:10px">
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Selected</div>
        <div id="selPills"></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn btn-ghost" onclick="closeNew()">Cancel</button>
      <button class="btn btn-blue" onclick="submitTask()">Create Task</button>
    </div>
  </div>
</div>
<script src="./assets/js/auth.js"></script>
<script src="./assets/js/tasks.js"></script>
</body>
</html>
