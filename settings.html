<head>

    <div class="sb-logo">KIB</div>
    <div><div class="sb-name">ADC Task Manager</div><div class="sb-sub">Kuwait International Bank</div></div>
  </div>
  <div style="padding:8px;flex:1">
    <div class="sb-section">Main</div><a href="./tasks.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Tasks</span></a><a href="./tasks-archive.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span>Archive</span></a><a href="./todo.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>My To-Do</span></a><a href="./training.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Training</span></a><a href="./settings.html" class="nav-a on"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></a>

  <div style="padding:10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r1)">
      <div class="sb-av" id="sbAv"><span id="sbAvTxt">?</span></div>
      <div style="flex:1;min-width:0"><div class="sb-uname" id="sbUname">—</div><div class="sb-urole" id="sbUrole">—</div></div>
      <button onclick="AUTH.out()" style="background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;padding:4px;border-radius:4px" title="Sign out">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <header class="top-bar">
    <button class="sb-btn" id="sbBtn" aria-label="Menu"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="tb-title">Settings<small>ADC Task Manager</small></div>
  </header>
  <div class="page-content">
    <div class="hero"><div class="hero-body">
        <div class="hero-tag">System Configuration</div>
        <div class="hero-h">Settings</div>
        <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">Portal configuration</div>
      </div></div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-h"><span class="card-t">Your Account</span></div>
      <div class="card-b">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><div class="flbl">Full Name</div><div style="font-size:13px;font-weight:600;color:var(--t1)" id="sUser">&#8212;</div></div>
          <div><div class="flbl">Role</div><div style="font-size:13px;font-weight:600;color:var(--t1)" id="sRole">&#8212;</div></div>
          <div><div class="flbl">Team</div><div style="font-size:13px;font-weight:600;color:var(--t1)" id="sTeam">&#8212;</div></div>
          <div><div class="flbl">User ID</div><div style="font-size:12px;font-family:monospace;color:var(--t3)" id="sId">&#8212;</div></div>
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-h"><span class="card-t">SLA Thresholds (hours)</span></div>
      <div class="card-b">
        <div class="frow">
          <div class="fgrp"><label class="flbl">Critical</label><input type="number" id="slaC" value="4" min="1"></div>
          <div class="fgrp"><label class="flbl">High</label><input type="number" id="slaH" value="24" min="1"></div>
          <div class="fgrp"><label class="flbl">Medium</label><input type="number" id="slaM" value="72" min="1"></div>
          <div class="fgrp"><label class="flbl">Low</label><input type="number" id="slaL" value="168" min="1"></div>
        </div>
        <button id="saveBtn" class="btn btn-blue" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-t">Session</span></div>
      <div class="card-b"><button class="btn btn-red" onclick="logout()">Sign Out</button></div>
    </div>
  </div>
</main>

      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      <span>More</span>
    </button></nav><div class="more-bg" id="moreBg" onclick="this.classList.remove('open');document.getElementById('moreSheet').classList.remove('open')"></div>

  <div class="more-handle"></div>
  <div class="more-grid">
    <a href="./training.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a>
    <a href="./settings.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    <div class="more-item" onclick="AUTH.out()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
    </div>
  </div>
</div>
