<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>My To-Do — ADC Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/shared.css">
  <link rel="stylesheet" href="/assets/css/todo.css">
</head>
<body>

<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logomark">KIB</div>
    <div class="sidebar-title">ADC Task Manager</div>
    <div class="sidebar-sub">Kuwait International Bank</div>
  </div>
  <div class="sidebar-nav"><div class='nav-section'>Main</div><a href="/tasks.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks</a><a href="/tasks-archive.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Task Archive</a><a href="/todo.html" class="nav-item active"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>My To-Do</a><a href="/training.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a><div class='nav-section'>System</div><a href="/settings.html" class="nav-item" data-roles="HoD"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a></div>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="avatarInitials">?</div>
      <div><div class="user-name" id="sidebarName">...</div><div class="user-role" id="sidebarRole"></div></div>
      <button class="btn-logout" onclick="AUTH.logout()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</nav>

<!-- Layout -->
  <main class="main-content">

    <!-- Top bar -->
    <header class="top-bar">
      <button id="sidebarToggle" class="sb-toggle" aria-label="Menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="breadcrumb" id="pageTitle">My To-Do</span>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
        <button onclick="refreshTodos()" title="Refresh" style="background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;border-radius:8px;display:flex;align-items:center;transition:background .2s" onmouseenter="this.style.background='#F1F5F9'" onmouseleave="this.style.background='none'">
          <svg id="refreshIcon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        
      </div>
    </header>

    <!-- Content -->
    <div class="content-wrap">
      <div class="page-content">

        <!-- Hero Card -->
        <div class="td-hero">
          <div class="td-hero-body">
            <div class="td-hero-tag">Personal Checklist</div>
            <div class="td-hero-title" id="heroTitle">My To-Do List</div>
            <div class="td-hero-stats">
              <div>
                <div class="td-stat-val" id="heroPending">0</div>
                <div class="td-stat-lbl">Pending</div>
              </div>
              <div>
                <div class="td-stat-val" id="heroDone">0</div>
                <div class="td-stat-lbl">Done</div>
              </div>
              <div>
                <div class="td-stat-val" id="heroOverdue">0</div>
                <div class="td-stat-lbl">Overdue</div>
              </div>
              <div>
                <div class="td-stat-val" id="heroDueToday">0</div>
                <div class="td-stat-lbl">Due Today</div>
              </div>
            </div>
          </div>
          <!-- Progress ring -->
          <div class="td-ring-wrap">
            <svg viewBox="0 0 80 80" width="80" height="80">
              <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/>
              <circle id="ringFill" cx="40" cy="40" r="32" fill="none" stroke="#fff" stroke-width="6"
                stroke-dasharray="201" stroke-dashoffset="201"
                stroke-linecap="round" transform="rotate(-90 40 40)"
                style="transition:stroke-dashoffset .6s ease"/>
              <text x="40" y="45" text-anchor="middle" font-size="14" font-weight="800" fill="#fff" id="ringPct">0%</text>
            </svg>
          </div>
        </div>

        <!-- Add card -->
        <div class="td-add" id="addCard">
          <!-- Main input row -->
          <div class="td-add-top" onclick="focusAdd()">
            <div class="td-add-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <input id="tdInput" placeholder="Add a new task..." autocomplete="off"
              onkeydown="if(event.key==='Enter'&&this.value.trim())addTodo();if(event.key==='Escape')blurAdd()">
          </div>
          <!-- Expanded options - hidden until focused -->
          <div class="td-add-expand" id="addExpand">
            <div class="td-add-options">
              <button type="button" class="td-option-pill" id="datePill" onclick="openDatePicker()" title="Set due date">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="dueLbl">Due date</span>
              </button>
              <input type="date" id="tdDue" onchange="updateDueLabel()" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
              <button type="button" class="td-option-pill" id="notePill" onclick="toggleNote()" title="Add note">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
                <span id="noteLblTxt">Note</span>
              </button>
            </div>
            <!-- Note input - shown when note pill clicked -->
            <div id="noteWrap" style="display:none;padding:0 20px 14px">
              <input id="tdNote" placeholder="Add a note..." style="width:100%;border:none;border-bottom:1.5px solid var(--border,#E4EAF3);outline:none;font-size:13px;font-family:inherit;color:var(--t2);padding:6px 0;background:transparent;transition:border-color .2s" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
            </div>
            <div class="td-add-footer">
              <button class="td-cancel-btn" onclick="blurAdd()">Cancel</button>
              <button class="td-add-btn" id="btnAdd" onclick="addTodo()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Task
              </button>
            </div>
          </div>
        </div>

        <!-- Filter tabs -->
        <div class="td-tabs" id="tdTabs">
          <button class="td-tab active" onclick="setFilter('pending',this)">
            📋 Pending <span class="cnt" id="cntPending">0</span>
          </button>
          <button class="td-tab" onclick="setFilter('today',this)">
            📅 Today <span class="cnt" id="cntToday">0</span>
          </button>
          <button class="td-tab" onclick="setFilter('overdue',this)">
            🔴 Overdue <span class="cnt" id="cntOverdue">0</span>
          </button>
          <button class="td-tab" onclick="setFilter('done',this)">
            ✅ Done <span class="cnt" id="cntDone">0</span>
          </button>
          <button class="td-tab" onclick="setFilter('all',this)">All</button>
        </div>

        <!-- List -->
        <div id="tdList">
          <div class="td-empty">
            <div class="td-empty-icon">📋</div>
            <div class="td-empty-title">Loading your to-do list...</div>
          </div>
        </div>

      </div>
    </div>
  </main>

<nav class="mobile-bottom-nav" id="mobileBottomNav">
  <a href="/tasks.html" class="mbn-item">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Tasks</span>
  </a>
  <a href="/tasks-archive.html" class="mbn-item" data-page="archive">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    <span>Archive</span>
  </a>
  <a href="/todo.html" class="mbn-item" data-page="todo">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>To-Do</span>
  </a>
  <button class="mbn-item mbn-more" onclick="toggleMobileMore()" id="btnMobileMore">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    <span>More</span>
  </button>
</nav>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/todo.js"></script>
</body>
</html>
