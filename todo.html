<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>My To-Do - ADC Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/shared.css">
  <link rel="stylesheet" href="./assets/css/todo.css">
</head>
<body>

<div id="overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>
<nav class="sidebar" id="sidebar">
  <div style="padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0">
    <div class="sb-logo">KIB</div>
    <div><div class="sb-name">ADC Task Manager</div><div class="sb-sub">Kuwait International Bank</div></div>
  </div>
  <div style="padding:8px;flex:1">
    <div class="sb-section">Main</div><a href="./tasks.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Tasks</span></a><a href="./tasks-archive.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span>Archive</span></a><a href="./todo.html" class="nav-a on"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>My To-Do</span></a><a href="./training.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Training</span></a><a href="./settings.html" class="nav-a"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></a>
  </div>
  <div style="padding:10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r1)">
      <div class="sb-av" id="sbAv"><span id="sbAvTxt">?</span></div>
      <div style="flex:1;min-width:0"><div class="sb-uname" id="sbUname">—</div><div class="sb-urole" id="sbUrole">—</div></div>
      <button onclick="AUTH.out()" style="background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;padding:4px;border-radius:4px" title="Sign out">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <header class="top-bar">
    <button class="sb-btn" id="sbBtn" aria-label="Menu"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="tb-title">My To-Do<small>ADC Task Manager</small></div>
  </header>
  <div class="page-content">
    <div class="hero" style="display:flex;align-items:center;gap:20px">
      <div class="hero-body">
        <div class="hero-tag">Personal Checklist</div>
        <div class="hero-h">My To-Do List</div>
        <div class="hero-stats">
          <div><div class="hval" id="hPend">&#8212;</div><div class="hlbl">Pending</div></div>
          <div><div class="hval" id="hDone" style="color:#6EE7B7">&#8212;</div><div class="hlbl">Done</div></div>
          <div><div class="hval" id="hOver" style="color:#FCA5A5">&#8212;</div><div class="hlbl">Overdue</div></div>
          <div><div class="hval" id="hDue" style="color:#FDE68A">&#8212;</div><div class="hlbl">Today</div></div>
        </div>
      </div>
      <div class="hero-ring" style="position:relative;flex-shrink:0"><svg width="76" height="76" viewBox="0 0 76 76"><circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/><circle id="hRing" cx="38" cy="38" r="32" fill="none" stroke="#6EE7B7" stroke-width="6" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="201" transform="rotate(-90 38 38)" style="transition:stroke-dashoffset .6s ease"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff" id="hPct">0%</div></div>
    </div>
    <div id="addCard" style="background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r3);padding:12px 14px;margin-bottom:14px;box-shadow:var(--s1);cursor:text;transition:border-color .2s,box-shadow .2s" onclick="focusAdd()">
      <div style="display:flex;align-items:center;gap:10px">
        <div onclick="event.stopPropagation();addTodo()" style="width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:300;flex-shrink:0;cursor:pointer">+</div>
        <input type="text" id="addIn" placeholder="Add a task..." style="flex:1;border:none;background:transparent;font-size:14px;color:var(--t1);outline:none" oninput="onAddInput()" onkeydown="if(event.key==='Enter')addTodo()">
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);flex-wrap:wrap">
        <button id="duePill" onclick="event.stopPropagation();openDp()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--bdr);border-radius:20px;background:var(--card);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">
          &#128197; <span id="dueLbl">Due date</span>
        </button>
        <input type="date" id="addDue" style="display:none;width:0;height:0;opacity:0;position:absolute" onchange="updDue()">
        <button id="notePill" onclick="event.stopPropagation();toggleNote()" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--bdr);border-radius:20px;background:var(--card);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">&#128221; <span id="noteLbl">Note</span></button>
        <div style="flex:1"></div>
        <button id="addBtn" onclick="event.stopPropagation();addTodo()" class="btn btn-blue btn-sm" disabled>Add</button>
      </div>
      <div id="noteWrap" style="display:none;margin-top:10px"><textarea id="addNote" placeholder="Add a note..." rows="2" onclick="event.stopPropagation()"></textarea></div>
    </div>
    <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;-webkit-overflow-scrolling:touch">
      <button class="pill td-pill on" onclick="setTF('all',this)">All <span id="cAll"></span></button>
      <button class="pill td-pill" onclick="setTF('pending',this)">Pending <span id="cPend"></span></button>
      <button class="pill td-pill" onclick="setTF('today',this)">Today <span id="cDue"></span></button>
      <button class="pill td-pill" onclick="setTF('overdue',this)">Overdue <span id="cOver"></span></button>
      <button class="pill td-pill" onclick="setTF('done',this)">Done <span id="cDone"></span></button>
    </div>
    <div id="tdList"><div class="loading"><div class="spin" style="margin-bottom:10px"></div><div>Loading...</div></div></div>
  </div>
</main>

<nav class="mbn" id="mbn"><a href="./tasks.html" class="mbn-a"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Tasks</span></a><a href="./tasks-archive.html" class="mbn-a"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span>Archive</span></a><a href="./todo.html" class="mbn-a on"><svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>To-Do</span></a><button class="mbn-a" onclick="document.getElementById('moreSheet').classList.add('open');document.getElementById('moreBg').classList.add('open')">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      <span>More</span>
    </button></nav><div class="more-bg" id="moreBg" onclick="this.classList.remove('open');document.getElementById('moreSheet').classList.remove('open')"></div>
<div class="more-sheet" id="moreSheet">
  <div class="more-handle"></div>
  <div class="more-grid">
    <a href="./training.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a>
    <a href="./settings.html" class="more-item"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    <div class="more-item" onclick="AUTH.out()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
    </div>
  </div>
</div>


<script src="./assets/js/mock.js"></script>
<script src="./assets/js/auth.js"></script>
<script src="./assets/js/todo.js"></script>
</body>
</html>
