<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Training — ADC Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/shared.css">
  <link rel="stylesheet" href="./assets/css/training.css">
</head>
<body>

<div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logomark">KIB</div>
    <div class="sidebar-title">ADC Task Manager</div>
    <div class="sidebar-sub">Kuwait International Bank</div>
  </div>
  <div class="sidebar-nav"><div class='nav-section'>Main</div><a href="./tasks.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks</a><a href="./tasks-archive.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Task Archive</a><a href="./todo.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>My To-Do</a><a href="./training.html" class="nav-item active"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a><div class='nav-section'>System</div><a href="./settings.html" class="nav-item" data-roles="HoD"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Settings</a></div>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="avatarInitials">?</div>
      <div><div class="user-name" id="sidebarName">...</div><div class="user-role" id="sidebarRole"></div></div>
      <button class="btn-logout" onclick="AUTH.logout()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</nav>

<main class="main-content">
<header class="top-bar">
  <button class="sidebar-toggle" id="sidebarToggle" style="touch-action:manipulation"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="breadcrumb">Training</div>
  <div class="search-bar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="srch" placeholder="Search..."></div>
  
</header>
<div class="page-content">
  <!-- Hero Card -->
  <div class="page-hero">
    <div class="ph-body">
      <div class="ph-tag">Coaching & Training</div>
      <div class="ph-title">Training Plans</div>
      <div class="ph-stats">
        <div><div class="ph-stat-val" id="tA">—</div><div class="ph-stat-lbl">Active</div></div>
        <div><div class="ph-stat-val" id="tD" style="color:#FCA5A5">—</div><div class="ph-stat-lbl">Delayed</div></div>
        <div><div class="ph-stat-val" id="tC" style="color:#6EE7B7">—</div><div class="ph-stat-lbl">Done</div></div>
        <div><div class="ph-stat-val" id="tP">—</div><div class="ph-stat-lbl">Total</div></div>
      </div>
    </div>
    <div class="ph-ring">
      <svg viewBox="0 0 80 80" width="80" height="80">
        <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/>
        <circle id="trainRingFill" cx="40" cy="40" r="32" fill="none" stroke="#fff" stroke-width="6"
          stroke-dasharray="201" stroke-dashoffset="201" stroke-linecap="round" transform="rotate(-90 40 40)"
          style="transition:stroke-dashoffset .6s ease"/>
        <text x="40" y="45" text-anchor="middle" font-size="13" font-weight="800" fill="#fff" id="trainRingPct">—</text>
      </svg>
    </div>
  </div>
  <!-- Filter + Action -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <select class="filter-select" id="tSt" style="padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--t1);outline:none"><option value="">All Statuses</option><option>InProgress</option><option>Delayed</option><option>Completed</option><option>Assigned</option></select>
    <button onclick="openNewTrainingModal()" class="btn btn-primary" id="btnNewPlan" style="display:none">+ New Plan</button>
  </div>

  <!-- Training Plan List -->
  <div id="planList" style="display:flex;flex-direction:column;gap:12px;min-height:120px">
    <!-- Loading state -->
    <div id="planLoading" style="padding:40px;text-align:center;color:#8A9BB0">
      <div style="width:28px;height:28px;border:3px solid #E4EAF3;border-top-color:#1877C5;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div>
      Loading training plans...
    </div>
  </div>

<!-- Training Card Modal -->
<div id="cardModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;padding:16px;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:20px;width:100%;max-width:680px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.4);position:relative">
    <button onclick="closeCard()" style="position:absolute;top:14px;right:14px;z-index:20;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;color:#fff;display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
    <div id="cardBody" style="overflow-y:auto;flex:1;min-height:0"></div>
  </div>
</div>

<!-- Mobile Bottom Navigation -->

<nav class="mobile-bottom-nav" id="mobileBottomNav">
  <a href="./tasks.html" class="mbn-item">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Tasks</span>
  </a>
  <a href="./tasks-archive.html" class="mbn-item" data-page="archive">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    <span>Archive</span>
  </a>
  <a href="./todo.html" class="mbn-item" data-page="todo">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>To-Do</span>
  </a>
  <button class="mbn-item mbn-more" onclick="toggleMobileMore()" id="btnMobileMore">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    <span>More</span>
  </button>
</nav>

<script src="./assets/js/auth.js"></script>
<script src="./assets/js/training.js"></script>
</body>
</html>
